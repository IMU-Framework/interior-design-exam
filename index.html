<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>乙級技術士學科測驗模擬機 · 建築物室內設計</title>
  <link rel="stylesheet" href="project/styles.css?v=9" />
  <style>
    /* Skeleton shimmer — removed automatically when React mounts */
    @keyframes sk-shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .sk {
      border-radius: 6px;
      background: var(--surface, #f1f1f1);
      background-image: linear-gradient(
        90deg,
        var(--surface, #f1f1f1) 0px,
        var(--surface-2, #e4e4e4) 80px,
        var(--surface, #f1f1f1) 160px
      );
      background-size: 600px 100%;
      animation: sk-shimmer 1.4s infinite linear;
    }
    .sk-topbar {
      display: flex; align-items: center; gap: 12px;
      height: 60px; padding: 0 24px;
      border-bottom: 1px solid var(--line, #e5e5e5);
      max-width: 100%;
    }
    .sk-brand { width: 220px; height: 20px; }
    .sk-spacer { flex: 1; }
    .sk-btn { width: 36px; height: 36px; border-radius: 8px; }
    .sk-body { max-width: 680px; margin: 0 auto; padding: 48px 24px 80px; }
    .sk-eyebrow { width: 180px; height: 13px; margin-bottom: 16px; }
    .sk-h1 { width: 62%; height: 36px; margin-bottom: 14px; }
    .sk-lede { width: 100%; height: 14px; margin-bottom: 8px; }
    .sk-lede.s2 { width: 75%; margin-bottom: 32px; }
    .sk-stat-row {
      display: flex; flex-wrap: wrap; gap: 28px;
      padding: 22px 0; margin-bottom: 32px;
      border-top: 1px solid var(--line, #e5e5e5);
      border-bottom: 1px solid var(--line, #e5e5e5);
    }
    .sk-stat-n { width: 52px; height: 28px; margin-bottom: 6px; }
    .sk-stat-l { width: 96px; height: 12px; }
    .sk-section-label { width: 120px; height: 16px; margin: 40px 0 18px; }
    .sk-card {
      width: 100%; height: 88px; border-radius: 14px; margin-bottom: 12px;
    }
  </style>
  <script>
    // set theme before paint to avoid flash
    (function () {
      try {
        var t = localStorage.getItem('ylab_theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
    // base path for question images (project/images/ relative to this root index.html)
    window.IMG_ROOT = 'project/images/';
  </script>
</head>
<body>
  <div id="root">
    <!-- Skeleton shown while JS loads; React replaces this on mount -->
    <div class="sk-topbar">
      <div class="sk sk-brand"></div>
      <div class="sk-spacer"></div>
      <div class="sk sk-btn"></div>
    </div>
    <div class="sk-body">
      <div class="sk sk-eyebrow"></div>
      <div class="sk sk-h1"></div>
      <div class="sk sk-lede"></div>
      <div class="sk sk-lede s2"></div>
      <div class="sk-stat-row">
        <div><div class="sk sk-stat-n"></div><div class="sk sk-stat-l"></div></div>
        <div><div class="sk sk-stat-n"></div><div class="sk sk-stat-l"></div></div>
        <div><div class="sk sk-stat-n"></div><div class="sk sk-stat-l"></div></div>
        <div><div class="sk sk-stat-n"></div><div class="sk sk-stat-l"></div></div>
      </div>
      <div class="sk sk-section-label"></div>
      <div class="sk sk-card"></div>
      <div class="sk sk-card"></div>
      <div class="sk sk-card"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

  <!-- Load question bank from per-subject JSON files, then boot core + UI -->
  <script>
    (async function bootExam() {
      var CODES = ['12500', '90006', '90007', '90008', '90009'];
      try {
        var parts = await Promise.all(CODES.map(function (c) {
          return fetch('project/data/bank-' + c + '.json').then(function (r) {
            if (!r.ok) throw new Error('bank-' + c + '.json ' + r.status);
            return r.json();
          });
        }));
        var bank = parts.flat();
        // Apply admin draft overrides (localStorage) if present
        try {
          var draft = JSON.parse(localStorage.getItem('ylab_admin_draft_v1') || '{}');
          if (draft && typeof draft === 'object') {
            bank = bank.map(function (q) {
              var d = draft[q.id];
              return d ? Object.assign({}, q, d) : q;
            });
          }
        } catch (e) {}
        window.QUESTION_BANK = bank;
      } catch (e) {
        document.getElementById('root').innerHTML =
          '<div style="max-width:560px;margin:80px auto;font-family:sans-serif;line-height:1.7;color:#b4651b">'
          + '<h2>題庫載入失敗</h2><p>無法讀取題庫 JSON：<code>' + e.message + '</code></p>'
          + '<p>請透過預覽伺服器開啟本頁（直接以 file:// 開啟會被瀏覽器阻擋 fetch）。</p></div>';
        return;
      }

      function loadScript(src) {
        return new Promise(function (res, rej) {
          var s = document.createElement('script');
          s.src = src; s.onload = res; s.onerror = rej;
          document.body.appendChild(s);
        });
      }

      // core logic (plain JS) — reads window.QUESTION_BANK
      await loadScript('project/exam-core.js');

      // pre-compiled UI scripts (no Babel needed)
      var scripts = [
        'js/icons.js',
        'js/qimage.js',
        'js/home.js',
        'js/practice.js',
        'js/exam-screen.js',
        'js/result.js',
        'js/app.js',
      ];
      for (var i = 0; i < scripts.length; i++) {
        await loadScript(scripts[i]);
      }
    })();
  </script>
</body>
</html>
