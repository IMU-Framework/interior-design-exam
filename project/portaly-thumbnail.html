<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portaly 縮圖 · 乙級學科模擬機</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" />
<style>
  :root{
    --bg:#ffffff; --surface:#fafafa; --surface-2:#f2f2f0;
    --ink:#121212; --ink-soft:#3a3a3a; --muted:#767676; --faint:#a3a3a3;
    --line:#e7e7e4; --line-strong:#d3d3cf; --on-ink:#ffffff;
    --ok:oklch(0.55 0.13 150); --ok-bg:oklch(0.95 0.04 150);
    --shadow-lg:0 4px 12px rgba(0,0,0,.08), 0 24px 60px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#9a9a96;}
  body{display:grid;place-items:center;min-height:100vh;padding:24px;
    font-family:'Noto Sans TC',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-feature-settings:"tnum";}

  /* ---- 1280x640 export canvas ---- */
  .cover{
    position:relative; width:1280px; height:640px; flex:none;
    background:var(--bg); color:var(--ink); overflow:hidden;
    display:grid; grid-template-columns:1fr 472px;
    box-shadow:var(--shadow-lg);
  }
  /* faint dot grid texture on the canvas */
  .cover::before{
    content:""; position:absolute; inset:0; pointer-events:none;
    background-image:radial-gradient(var(--line) 1px, transparent 1px);
    background-size:26px 26px; opacity:.5;
    -webkit-mask-image:linear-gradient(105deg,#000 0 48%, transparent 72%);
            mask-image:linear-gradient(105deg,#000 0 48%, transparent 72%);
  }

  /* ===== left content ===== */
  .left{position:relative;z-index:2;padding:64px 56px 56px 72px;display:flex;flex-direction:column;}
  .brand{display:flex;align-items:center;gap:13px;font-weight:700;letter-spacing:-.01em;}
  .brand-mark{width:42px;height:42px;border-radius:11px;background:var(--ink);color:var(--on-ink);
    display:grid;place-items:center;font-weight:900;font-size:22px;flex:none;}
  .brand-name{font-size:17px;}
  .brand-name small{display:block;color:var(--muted);font-size:12.5px;font-weight:400;letter-spacing:.01em;}

  .eyebrow{margin-top:54px;font-size:13px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--muted);font-weight:600;}
  h1{font-size:74px;line-height:1.16;font-weight:900;letter-spacing:-.035em;margin-top:16px;}
  h1 .sub{display:block;font-size:25px;font-weight:700;letter-spacing:-.01em;color:var(--ink-soft);margin-top:18px;}
  .lede{margin-top:20px;color:var(--muted);font-size:16.5px;line-height:1.6;max-width:34ch;}

  .pills{display:flex;gap:10px;margin-top:auto;flex-wrap:wrap;}
  .pill{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;white-space:nowrap;
    padding:9px 15px;border:1px solid var(--line-strong);border-radius:99px;background:var(--surface);}
  .pill .n{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--faint);}

  /* ===== right rail — floating score card ===== */
  .right{position:relative;z-index:2;display:grid;place-items:center;
    background:linear-gradient(160deg,var(--surface) 0%, var(--surface-2) 100%);
    border-left:1px solid var(--line);}
  .right::before{content:"";position:absolute;inset:0;
    background-image:radial-gradient(var(--line-strong) 1px, transparent 1px);background-size:22px 22px;opacity:.45;}

  .card{position:relative;width:344px;background:var(--bg);border:1px solid var(--line);
    border-radius:20px;box-shadow:var(--shadow-lg);padding:30px 30px 26px;transform:rotate(-3deg);}
  .card-top{display:flex;align-items:center;justify-content:space-between;}
  .verdict{font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--ok);}
  .stamp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--faint);}
  .score{display:flex;align-items:baseline;gap:6px;margin-top:10px;}
  .score b{font-size:86px;font-weight:900;letter-spacing:-.04em;line-height:.9;}
  .score span{font-size:22px;font-weight:500;color:var(--muted);}
  .score-cap{font-size:13px;color:var(--muted);margin-top:6px;}
  .bar{height:8px;border-radius:99px;background:var(--surface-2);overflow:hidden;margin-top:18px;}
  .bar > i{display:block;height:100%;width:82%;background:var(--ink);border-radius:99px;}
  .rows{margin-top:18px;display:flex;flex-direction:column;gap:11px;}
  .row{display:flex;align-items:center;justify-content:space-between;font-size:13px;}
  .row .k{color:var(--muted);}
  .row .v{font-family:'JetBrains Mono',monospace;font-weight:700;}
  .row .v.ok{color:var(--ok);}

  .badge-float{position:absolute;top:-16px;left:-22px;transform:rotate(-3deg);
    background:var(--ink);color:var(--on-ink);font-size:12px;font-weight:700;letter-spacing:.04em;
    padding:8px 14px;border-radius:99px;box-shadow:var(--shadow-lg);}

  /* corner spec */
  .corner{position:absolute;right:34px;bottom:28px;z-index:3;font-family:'JetBrains Mono',monospace;
    font-size:11.5px;color:var(--faint);letter-spacing:.05em;}

  /* ===== dark variant — monochrome inverted ===== */
  .cover.dark{
    --bg:#0e0e0f; --surface:#161617; --surface-2:#1d1d1f;
    --ink:#f4f4f2; --ink-soft:#c9c9c5; --muted:#8c8c8a; --faint:#5c5c5a;
    --line:#262627; --line-strong:#34343a; --on-ink:#0e0e0f;
    --ok:oklch(0.78 0.15 152);
    --shadow-lg:0 4px 14px rgba(0,0,0,.5), 0 28px 70px rgba(0,0,0,.6);
  }
  .cover.dark .brand-mark{background:var(--ink);color:#0e0e0f;}
  .cover.dark .right{background:linear-gradient(160deg,#161617 0%, #0c0c0d 100%);}
  .cover.dark .badge-float{background:var(--ink);color:#0e0e0f;}
  .cover.dark .bar > i{background:var(--ink);}

  .hint{margin-top:22px;font-size:13px;color:#111;font-family:'JetBrains Mono',monospace;opacity:.8;display:flex;gap:14px;align-items:center;}
  .toggle{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;
    padding:7px 14px;border-radius:99px;border:1px solid #555;background:#1c1c1c;color:#fff;}
</style>
</head>
<body>
  <div class="cover dark" id="cover">
    <div class="left">
      <div class="brand">
        <span class="brand-mark">乙</span>
        <span class="brand-name">乙級學科測驗模擬機
技術士技能檢定 · 學科測驗</span>
      </div>

      <div class="eyebrow">12500 建築物室內設計 · 乙級</div>
      <h1>學科測驗<br/>模擬機<span class="sub">隨機抽題 ｜ 自動計分 ｜ 及格判定</span></h1>
      <p class="lede">依技術士技能檢定學科參考資料建置題庫，完整模擬正式考試的作答與檢討流程。</p>

      <div class="pills">
        <span class="pill"><span class="n">01</span>正式考試模擬</span>
        <span class="pill"><span class="n">02</span>依題組抽考</span>
        <span class="pill"><span class="n">03</span>逐題練習</span>
      </div>
    </div>

    <div class="right">
      <div class="card">
        <div class="badge-float">滿分 100 · 60 及格</div>
        <div class="card-top">
          <span class="verdict">合　格</span>
          <span class="stamp">RESULT</span>
        </div>
        <div class="score"><b>82</b><span>/ 100</span></div>
        <div class="score-cap">80 題作答完成 · 100 分鐘內交卷</div>
        <div class="bar"><i></i></div>
        <div class="rows">
          <div class="row"><span class="k">單選 60 題</span><span class="v">52 / 60</span></div>
          <div class="row"><span class="k">複選 20 題</span><span class="v">15 / 20</span></div>
          <div class="row"><span class="k">判定</span><span class="v ok">PASS ≥ 60</span></div>
        </div>
      </div>
    </div>

    <div class="corner">1280 × 640 · 建築物室內設計乙級</div>
  </div>

  <div class="hint" id="hint">
    <button class="toggle" onclick="document.getElementById('cover').classList.toggle('dark')">☀ / ☾ 切換淺／深色</button>
    <span>截圖此 1280×640 區塊即為 Portaly 商品縮圖</span>
  </div>
</body>
</html>
