<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>題庫管理後台 · 乙級技術士學科測驗模擬機</title>
  <link rel="stylesheet" href="styles.css?v=9" />
  <link rel="stylesheet" href="admin.css?v=5" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem('ylab_theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    (async function bootAdmin() {
      var CODES = ['12500', '90006', '90007', '90008', '90009'];
      try {
        var parts = await Promise.all(CODES.map(function (c) {
          return fetch('data/bank-' + c + '.json').then(function (r) {
            if (!r.ok) throw new Error('bank-' + c + '.json ' + r.status);
            return r.json();
          });
        }));
        var byCode = {};
        CODES.forEach(function (c, i) { byCode[c] = parts[i]; });
        window.ADMIN_ORIGINALS = byCode;
      } catch (e) {
        document.getElementById('root').innerHTML =
          '<div style="max-width:560px;margin:80px auto;font-family:sans-serif;line-height:1.7;color:#b4651b">'
          + '<h2>題庫載入失敗</h2><p>無法讀取 data/ 內的題庫 JSON：<code>' + e.message + '</code></p>'
          + '<p>請透過預覽伺服器開啟本頁。</p></div>';
        return;
      }
      var s = document.createElement('script');
      s.type = 'text/babel'; s.src = 'admin.jsx?v=5';
      document.body.appendChild(s);
      Babel.transformScriptTags();
    })();
  </script>
</body>
</html>
